name: Bug Report from iOS App

on:
  repository_dispatch:
    types: [bug-report]

jobs:
  create_issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: context.payload.client_payload.title,
              body: context.payload.client_payload.body,
              labels: ["bug"]
            })
